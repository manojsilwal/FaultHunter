name: Daily FaultHunter Report

on:
  schedule:
    - cron: "25 3 * * *"
  workflow_dispatch:
    inputs:
      target_base_url:
        description: "TradeTalk API base URL for this run only. Leave empty to use repository secret TRADETALK_BASE_URL (production/staging)."
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  run-report:
    runs-on: ubuntu-latest
    env:
      FAULTHUNTER_REPORT_ROOT: reports
      FAULTHUNTER_ARTIFACT_ROOT: artifacts
      FAULTHUNTER_BROWSER_PROBE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set TradeTalk target URL
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.target_base_url }}" ]; then
            echo "TRADETALK_BASE_URL=${{ inputs.target_base_url }}" >> "$GITHUB_ENV"
            echo "Using workflow_dispatch target_base_url override."
          else
            echo "TRADETALK_BASE_URL=${{ secrets.TRADETALK_BASE_URL }}" >> "$GITHUB_ENV"
            echo "Using TRADETALK_BASE_URL secret."
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: pip install -e '.[dev]'

      - name: Emit feature spec catalog
        run: python -m faulthunter.cli --emit-feature-spec

      - name: Install browser probe deps
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Generate daily report
        run: python -m faulthunter.cli --profile daily --report-kind daily

      - name: Upload evaluation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: faulthunter-artifacts
          path: artifacts

      - name: Commit reports and feature spec
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- reports specs; then
            echo "No report or spec changes to commit."
            exit 0
          fi
          git add reports specs
          git commit -m "Add FaultHunter daily report and feature spec for $(date -u +%F)"
          git push
