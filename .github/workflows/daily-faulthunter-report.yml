name: Daily FaultHunter Report

on:
  schedule:
    - cron: "25 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-report:
    runs-on: ubuntu-latest
    env:
      TRADETALK_BASE_URL: ${{ secrets.TRADETALK_BASE_URL }}
      FAULTHUNTER_REPORT_ROOT: reports
      FAULTHUNTER_ARTIFACT_ROOT: artifacts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: pip install -e '.[dev]'

      - name: Generate daily report
        run: python -m faulthunter.cli --profile daily --report-kind daily

      - name: Commit reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- reports; then
            echo "No report changes to commit."
            exit 0
          fi
          git add reports
          git commit -m "Add FaultHunter daily report"
          git push
